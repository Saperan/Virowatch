<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Virowatch</title>
  <link id="themeStylesheet" rel="stylesheet" href="virostyle.css">
  <script>
    (function() {
      var link = document.getElementById('themeStylesheet');
      if (!link) return;
      var THEME_HREF = {
        'auto': null,
        'desktop-dark': 'virostyle.css',
        'desktop-light': 'virostyle-light.css',
        'mobile-dark': 'virostyle2.css',
        'mobile-light': 'virostyle2-light.css'
      };
      function isMobileViewport() {
        var w = window.innerWidth, h = window.innerHeight;
        return w <= 768 || (w / h) <= (9 / 16);
      }
      function resolveHref(key) {
        if (key === 'auto') {
          return isMobileViewport() ? 'virostyle2.css' : 'virostyle.css';
        }
        return THEME_HREF[key] || 'virostyle.css';
      }
      var saved = localStorage.getItem('theme');
      if (!saved || !THEME_HREF[saved]) {
        saved = 'auto';
        localStorage.setItem('theme', saved);
      }
      link.href = resolveHref(saved);
    })();
  </script>
  <link rel="icon" href="https://i.ibb.co/FkdMbG4N/virowatch-new-icon-tihngy-cropped.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@100;300;400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

  <button class="app-sidebar-toggle" type="button" aria-label="Toggle sidebar">
    <span></span>
  </button>
  <div class="app-sidebar-overlay" aria-hidden="true"></div>
  <aside class="app-sidebar">
    <nav>
      <div class="app-sidebar-theme-section">
        <span class="app-sidebar-theme-label">Style</span>
        <select id="app-sidebar-theme-select" class="app-sidebar-theme-select" aria-label="Choose style">
          <option value="auto">Auto</option>
          <option value="desktop-dark">Desktop Dark</option>
          <option value="desktop-light">Desktop Light</option>
          <option value="mobile-dark">Mobile Dark</option>
          <option value="mobile-light">Mobile Light</option>
        </select>
      </div>
      <div class="app-sidebar-custom-section">
        <span class="app-sidebar-theme-label">Custom CSS</span>
        <input type="file" id="app-custom-css-file" accept=".css,text/css" class="app-custom-css-file-input" hidden>
        <button type="button" id="app-import-css-btn" class="app-sidebar-import-btn">Import CSS file</button>
        <div id="app-custom-css-list" class="app-sidebar-custom-list"></div>
      </div>
      <div class="app-sidebar-link-section">
        <a href="https://discord.gg/jdKvsPWNme" target="_blank" rel="noopener" class="app-sidebar-import-btn app-sidebar-content-request">
          <span class="app-sidebar-btn-icon" aria-hidden="true">
            <img src="https://i.ibb.co/FkdMbG4N/virowatch-new-icon-tihngy-cropped.png" alt="">
          </span>
          <span class="app-sidebar-btn-text">Content Request</span>
        </a>
      </div>
      <div class="app-sidebar-custom-section">
        <button onclick="refreshPage()" type="button" class="app-sidebar-import-btn">Hard Refresh</button>
        <div class="bottom-text">Press if New Content doesnt show up</div>
        <script> function refreshPage() { window.location.reload(true); } </script>
      </div>
    </nav>
  </aside>

  <div class="container">
    <header>
      <h1 class="kanit-light site-title" id="siteTitle">
        <a href="https://discord.gg/jdKvsPWNme" class="site-title-icon-link">
          <img src="https://i.ibb.co/FkdMbG4N/virowatch-new-icon-tihngy-cropped.png" alt="Join Virowatch Discord!" class="site-title-icon"></a>
        Virowatch
      </h1>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search for content...">
      </div>
      <br>
    </header>

    <div id="hero">
      <section class="newest-added">
        <h2 class="newest-added-title">Newest added</h2>
        <div id="newestAddedList" class="newest-added-grid"></div>
      </section>
      <section id="categoryContainer" class="categories-section">
        <div class="category-cards">
          <div class="movie-item-banner category-card" data-category="lunora">
            <img src="https://i.ibb.co/f15zJkV/Umovies.png" alt="Lunora Movies">
            <span class="category-card-label">Lunora Movies Content</span>
          </div>
          <div class="movie-item-banner category-card" data-category="shows">
            <img src="https://variety.com/wp-content/uploads/2024/01/100-Greatest-TV-Shows-V1-2.jpg?w=1024" alt="Shows" loading="lazy">
            <span class="category-card-label">TV Shows</span>
          </div>
          <div class="movie-item-banner category-card" data-category="anime">
            <img src="https://static.crunchyroll.com/cr-acquisition/assets/img/start/hero/us-global/background-desktop.jpg" alt="Anime" loading="lazy">
            <span class="category-card-label">Anime</span>
          </div>
        </div>
      </section>
    </div>

    <div class="movie-list-wrapper" id="movieListWrapper" style="display:none;">
      <div class="movie-list" id="movieList"></div>
    </div>

    <div class="episode-container" id="episodeContainer" style="display:none;">
      <div class="sidebar" id="episodeSidebar">
        <div id="seasonSelectorContainer"></div>
        <div id="episodeListContainer"></div>
      </div>
      <div class="player">
        <div id="videoSpinner" class="spinner"></div>
        <iframe id="videoPlayer" src="" allowfullscreen class="fade-out"></iframe>
        <div class="controls">
          <a href="#" class="button dubbed-toggle">Dubbed</a>
          <a href="#" class="button" id="prevEpisode">Previous Episode</a>
          <a href="#" class="button" id="nextEpisode">Next Episode</a>
          <a href="#" class="button" id="backToCategory">Back to Categories</a>
          <div id="downloadContainer"></div>
        </div>
      </div>
    </div>

    <div class="bottom-text">
      Virowatch — All Rights Reserved to Original content Authors<br>Last updated: 06.04.2026
    </div>
  </div>

  <script>
  const watchNowButton = document.querySelector('.watch');
  const heroSection = document.getElementById('hero');
  const categoryBanners = document.querySelectorAll('.movie-item-banner');
  const backToCategoryButton = document.getElementById('backToCategory');
  const changelogContainer = document.getElementById('changelog-container');
  const movieListWrapper = document.getElementById('movieListWrapper');
  const siteTitle = document.getElementById('siteTitle');

  if (watchNowButton) {
    watchNowButton.addEventListener('click', () => {
      heroSection.style.display = 'none';
      movieListWrapper.style.display = 'block';
    });
  }

  categoryBanners.forEach(banner => {
    banner.addEventListener('click', () => {
      heroSection.style.display = 'none';
    });
  });

  if (backToCategoryButton) {
    backToCategoryButton.addEventListener('click', () => {
      heroSection.style.display = 'flex';
    });
  }

  if (siteTitle && backToCategoryButton) {
    siteTitle.addEventListener('click', (e) => {
      if (e.target.closest('a')) return;
      backToCategoryButton.click();
    });
  }

  if (changelogContainer) {
    const observeChangelog = new MutationObserver(() => {
      if (changelogContainer && changelogContainer.offsetHeight > 0) {
        heroSection.style.display = 'flex';
      }
    });
    observeChangelog.observe(changelogContainer, { childList: true, subtree: true });
  }
  </script>

  <script src="movies.js"></script>
  <script src="shows.js"></script>
  <script src="anime.js"></script>
  <script src="lunora-loader.js"></script>
  <script src="changelogs.js"></script>
  <script src="content.js"></script>
  <script src="sidebar.js"></script>
  <script src="watchlist.js"></script>
</body>
</html>
